# Security: hide Nginx version completely
server_tokens off;
more_clear_headers Server;

# ─── API Rate Limiting Zone ─────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

server {
    listen 80 default_server;
    server_name _;

    # ─── Security Headers — Hide All Server Identity ─────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(),microphone=(),camera=()" always;
    # Critical: hide server identity completely
    add_header Server "nginx" always;     # Replace real version with generic
    more_clear_headers "X-Powered-By";
    more_clear_headers "X-AspNet-Version";
    more_clear_headers "X-AspNetMvc-Version";

    # ─── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml
               application/vnd.apple.mpegurl;
    gzip_min_length 1000;

    client_max_body_size 2G;

    # ─── HLS Segments & Static Video Files ───────────────────────────────────
    location /videos/ {
        root /var/www;

        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t              ts;
            video/mp4               mp4;
            image/jpeg              jpg jpeg;
        }

        # M3U8 playlists — never cache (always fresh playlist)
        location ~* \.m3u8$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Access-Control-Allow-Origin * always;
        }

        # TS segments — immutable 1 year
        location ~* \.ts$ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header Access-Control-Allow-Origin * always;
        }

        # Thumbnails — 1 year
        location ~* thumbnail\.(jpg|jpeg|png)$ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # Previews — 7 days
        location ~* preview\.mp4$ {
            add_header Cache-Control "public, max-age=604800" always;
        }
    }

    # ─── API Rate Limiting ────────────────────────────────────────────────────

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # Hide backend identity
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # ─── Frontend (Next.js) ──────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        # Hide Node.js/Next.js version
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }
}
